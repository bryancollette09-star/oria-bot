<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIA — Tableau de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --gold: #c9a96e;
    --gold-soft: rgba(201,169,110,0.12);
    --rose: #e8b4b8;
    --purple: #9b8ec4;
    --teal: #7ec8b4;
    --amber: #f4a460;
    --text: #f0ede8;
    --text-muted: rgba(240,237,232,0.5);
    --text-faint: rgba(240,237,232,0.25);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Login ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-logo {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }

  .login-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .login-card input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1.2rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: var(--gold); }
  .login-card input::placeholder { color: var(--text-faint); }

  .btn-login {
    width: 100%;
    background: var(--gold);
    color: #07070f;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.85rem;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.88; }

  .login-error {
    color: #ff8a80;
    font-size: 0.8rem;
    margin-top: 0.75rem;
    min-height: 1.2rem;
  }

  /* ── Dashboard ── */
  #dashboard { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(7,7,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .topbar-logo {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
  }

  .topbar-badge {
    background: var(--gold-soft);
    color: var(--gold);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 100px;
    border: 1px solid rgba(201,169,110,0.2);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .last-updated {
    font-size: 0.72rem;
    color: var(--text-faint);
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.75rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

  .main {
    padding: 2rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── KPI cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .kpi-grid { grid-template-columns: 1fr; } }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.4rem 1.6rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--border-strong); }

  .kpi-accent {
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
  }

  .kpi-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }

  .kpi-value {
    font-size: 2rem;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .kpi-sub {
    font-size: 0.72rem;
    color: var(--text-faint);
  }

  /* ── Charts grid ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .charts-row-2 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  @media (max-width: 900px) {
    .charts-row, .charts-row-2 { grid-template-columns: 1fr; }
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }

  .chart-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1.2rem;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-top: 1rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Revenue card ── */
  .revenue-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .revenue-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--gold-soft);
    border: 1px solid rgba(201,169,110,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.3rem;
  }

  .revenue-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.3rem; }
  .revenue-value { font-size: 1.6rem; font-weight: 600; color: var(--gold); }
  .revenue-sub { font-size: 0.7rem; color: var(--text-faint); margin-top: 0.2rem; }

  /* ── Loader ── */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-faint);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  .pulse {
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">ORIA</div>
    <div class="login-sub">Tableau de bord gestionnaire</div>
    <input type="password" id="admin-key" placeholder="Clé d'accès administrateur" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Accéder au tableau de bord</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">ORIA</span>
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="last-updated">—</span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">

    <!-- KPI -->
    <div class="kpi-grid" id="kpi-grid">
      <div class="loader pulse">Chargement…</div>
    </div>

    <!-- Row 1: Donut + Line -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Thèmes les plus utilisés</div>
        <div class="chart-wrap" style="height:240px;">
          <canvas id="donut-chart" role="img" aria-label="Répartition des sessions par module de coaching"></canvas>
        </div>
        <div class="legend" id="donut-legend"></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Activité sur 30 jours</div>
        <div class="chart-wrap" style="height:240px;">
          <canvas id="line-chart" role="img" aria-label="Nombre de sessions et utilisatrices actives par jour sur 30 jours"></canvas>
        </div>
      </div>
    </div>

    <!-- Row 2: Bar + Revenue -->
    <div class="charts-row-2">
      <div class="chart-card">
        <div class="chart-title">Tokens moyens par module</div>
        <div class="chart-wrap" id="bar-wrap">
          <canvas id="bar-chart" role="img" aria-label="Estimation des tokens consommés par module de coaching"></canvas>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; gap:1rem;">

        <div class="chart-card">
          <div class="chart-title">Durée moy. d'abonnement</div>
          <div id="sub-stats" class="loader pulse" style="height:80px;">—</div>
        </div>

        <div class="revenue-card" id="revenue-card">
          <div class="revenue-icon">◈</div>
          <div>
            <div class="revenue-label">CA Estimé / mois</div>
            <div class="revenue-value" id="ca-value">—</div>
            <div class="revenue-sub">Basé sur les abonnées actives · Intégration Stripe bientôt</div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
const MODULE_COLORS = {
  confiance:     '#c9a96e',
  relations:     '#e8b4b8',
  emotions:      '#9b8ec4',
  argent:        '#7ec8b4',
  ambition:      '#f4a460',
  corps:         '#85b7eb',
  identite:      '#d4a8e8',
  toxique:       '#ff8a80',
  maternite:     '#a8e8c8',
  communication: '#e8d4a8',
  prepa_date:    '#b8d4e8',
  debrief_date:  '#c8c8f0'
};

const MODULE_LABELS = {
  confiance: 'Confiance en soi',
  relations: 'Relations & Limites',
  emotions: 'Émotions',
  argent: 'Indépendance financière',
  ambition: 'Ambition & Vision',
  corps: 'Corps & Féminité',
  identite: 'Identité & Valeurs',
  toxique: 'Comportements toxiques',
  maternite: 'Maternité',
  communication: 'Communication',
  prepa_date: 'Prépa Date',
  debrief_date: 'Débrief Date'
};

let adminKey = '';
let chartsInstances = {};

function doLogin() {
  const key = document.getElementById('admin-key').value.trim();
  if (!key) { showError('Entrez votre clé d\'accès.'); return; }
  adminKey = key;
  loadDashboard();
}

document.getElementById('admin-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  adminKey = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-key').value = '';
}

function showError(msg) {
  document.getElementById('login-error').textContent = msg;
}

async function loadDashboard() {
  showError('');
  try {
    const res = await fetch('/api/admin', {
      headers: { 'Authorization': `Bearer ${adminKey}` }
    });

    if (res.status === 401) { showError('Clé incorrecte. Réessaie.'); return; }
    if (!res.ok) { showError('Erreur serveur — mode démo activé.'); renderDemo(); return; }

    const data = await res.json();
    showDashboard(data);
  } catch (e) {
    showError('Impossible de contacter l\'API — mode démo activé.');
    renderDemo();
  }
}

function renderDemo() {
  const demo = {
    totalUsers: 47,
    activeUsers: 31,
    totalSessions: 284,
    avgSessionMinutes: 18.4,
    avgTokensPerSession: 1640,
    totalTokens: 465760,
    moduleStats: {
      confiance:     { label:'Confiance en soi',       sessions:72, messages:498, tokens:94200 },
      relations:     { label:'Relations & Limites',    sessions:61, messages:412, tokens:79800 },
      emotions:      { label:'Émotions',               sessions:48, messages:331, tokens:62400 },
      toxique:       { label:'Comportements toxiques', sessions:39, messages:287, tokens:51100 },
      ambition:      { label:'Ambition & Vision',      sessions:27, messages:189, tokens:35100 },
      argent:        { label:'Indépendance financière', sessions:18, messages:124, tokens:23400 },
      corps:         { label:'Corps & Féminité',       sessions:12, messages:84,  tokens:15600 },
      identite:      { label:'Identité & Valeurs',     sessions:4,  messages:28,  tokens:5200  },
      communication: { label:'Communication',          sessions:3,  messages:21,  tokens:3900  },
    },
    dailyActivity: Array.from({length:30},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-29+i);
      const sessions=Math.floor(Math.random()*12)+2;
      return { date:d.toISOString().split('T')[0], sessions, users:Math.max(1,Math.floor(sessions*0.7)) };
    }),
    monthlySignups: { '2025-11':4,'2025-12':8,'2026-01':12,'2026-02':9,'2026-03':8,'2026-04':6 },
    generatedAt: new Date().toISOString()
  };
  showDashboard(demo);
}

function showDashboard(data) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  const ts = new Date(data.generatedAt).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').textContent = `Mis à jour à ${ts}`;

  renderKPIs(data);
  renderDonut(data);
  renderLine(data);
  renderBar(data);
  renderSubStats(data);
  renderRevenue(data);
}

function renderKPIs(data) {
  const kpis = [
    { label: 'Utilisatrices', value: data.totalUsers, sub: `${data.activeUsers} actives ce mois`, accent: '#c9a96e' },
    { label: 'Sessions totales', value: data.totalSessions, sub: `${Math.round(data.totalSessions / Math.max(data.totalUsers,1) * 10)/10} par utilisatrice`, accent: '#e8b4b8' },
    { label: 'Durée moy. session', value: `${data.avgSessionMinutes} min`, sub: 'par conversation', accent: '#9b8ec4' },
    { label: 'Tokens moy./session', value: data.avgTokensPerSession.toLocaleString('fr-FR'), sub: `${Math.round(data.totalTokens/1000)}k tokens au total`, accent: '#7ec8b4' }
  ];

  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-accent" style="background:${k.accent}"></div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.accent}">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function renderDonut(data) {
  const sorted = Object.entries(data.moduleStats)
    .filter(([,v]) => v.sessions > 0)
    .sort(([,a],[,b]) => b.sessions - a.sessions)
    .slice(0,8);

  const labels = sorted.map(([k,v]) => v.label || MODULE_LABELS[k] || k);
  const values = sorted.map(([,v]) => v.sessions);
  const colors = sorted.map(([k]) => MODULE_COLORS[k] || '#888');
  const total = values.reduce((a,b)=>a+b,0);

  if (chartsInstances.donut) chartsInstances.donut.destroy();
  chartsInstances.donut = new Chart(document.getElementById('donut-chart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors.map(c => c + 'cc'),
        borderColor: colors,
        borderWidth: 1.5,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw} sessions (${Math.round(ctx.raw/total*100)}%)`
          }
        }
      }
    }
  });

  document.getElementById('donut-legend').innerHTML = sorted.map(([k,v]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${MODULE_COLORS[k]||'#888'}"></div>
      <span>${v.label || MODULE_LABELS[k] || k} <span style="color:var(--text-faint)">${Math.round(v.sessions/total*100)}%</span></span>
    </div>
  `).join('');
}

function renderLine(data) {
  const activity = data.dailyActivity;
  const labels = activity.map(d => {
    const dt = new Date(d.date);
    return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  });

  if (chartsInstances.line) chartsInstances.line.destroy();
  chartsInstances.line = new Chart(document.getElementById('line-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Sessions',
          data: activity.map(d=>d.sessions),
          borderColor: '#c9a96e',
          backgroundColor: 'rgba(201,169,110,0.08)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 2,
          pointHoverRadius: 5,
          pointBackgroundColor: '#c9a96e'
        },
        {
          label: 'Utilisatrices',
          data: activity.map(d=>d.users),
          borderColor: '#9b8ec4',
          backgroundColor: 'rgba(155,142,196,0.06)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 2,
          pointHoverRadius: 5,
          pointBackgroundColor: '#9b8ec4',
          borderDash: [4,3]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: 'rgba(240,237,232,0.35)', font: { size: 10, family: 'Sora' }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          ticks: { color: 'rgba(240,237,232,0.35)', font: { size: 10, family: 'Sora' } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.06)' },
          beginAtZero: true
        }
      }
    }
  });
}

function renderBar(data) {
  const sorted = Object.entries(data.moduleStats)
    .filter(([,v]) => v.tokens > 0)
    .sort(([,a],[,b]) => b.tokens - a.tokens)
    .slice(0, 8);

  const numBars = sorted.length;
  const wrapHeight = Math.max(260, numBars * 44 + 60);
  document.getElementById('bar-wrap').style.height = wrapHeight + 'px';

  const labels = sorted.map(([k,v]) => v.label || MODULE_LABELS[k] || k);
  const values = sorted.map(([,v]) => Math.round(v.tokens / Math.max(v.sessions,1)));
  const colors = sorted.map(([k]) => MODULE_COLORS[k] || '#888');

  if (chartsInstances.bar) chartsInstances.bar.destroy();
  chartsInstances.bar = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Tokens moy.',
        data: values,
        backgroundColor: colors.map(c => c + 'aa'),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toLocaleString('fr-FR')} tokens/session` } }
      },
      scales: {
        x: {
          ticks: { color: 'rgba(240,237,232,0.35)', font: { size: 10, family: 'Sora' } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          ticks: { color: 'rgba(240,237,232,0.5)', font: { size: 10.5, family: 'Sora' } },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  });
}

function renderSubStats(data) {
  const el = document.getElementById('sub-stats');
  const avgSessions = Math.round(data.totalSessions / Math.max(data.totalUsers, 1) * 10) / 10;
  const estimatedDays = Math.round(avgSessions * (data.avgSessionMinutes / 60 / 24) * 100) / 100;
  el.innerHTML = `
    <div style="display:flex;gap:1.5rem;align-items:center;height:100%;padding:0.5rem 0">
      <div>
        <div style="font-size:1.5rem;font-weight:600;color:#9b8ec4">${avgSessions}</div>
        <div style="font-size:0.68rem;color:var(--text-faint);margin-top:0.2rem">sessions / utilisatrice</div>
      </div>
      <div style="width:1px;height:40px;background:var(--border)"></div>
      <div>
        <div style="font-size:1.5rem;font-weight:600;color:#7ec8b4">${data.avgSessionMinutes} min</div>
        <div style="font-size:0.68rem;color:var(--text-faint);margin-top:0.2rem">durée moy. par session</div>
      </div>
    </div>
  `;
  el.classList.remove('pulse');
}

function renderRevenue(data) {
  const PRICE_PER_USER = 47;
  const estimated = data.activeUsers * PRICE_PER_USER;
  document.getElementById('ca-value').textContent = estimated.toLocaleString('fr-FR') + ' €';
}
</script>

</body>
</html>
